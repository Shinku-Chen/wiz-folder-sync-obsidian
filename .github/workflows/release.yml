name: Release Obsidian plugin

on:
    push:
        tags:
            - '*'

jobs:
    build:
        runs-on: ubuntu-latest
        permissions:
            contents: write
            id-token: write
            attestations: write
        steps:
            - uses: actions/checkout@v6

            - name: Use Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: 24
                  cache: 'npm'

            - name: Build plugin
              run: |
                  npm ci
                  npm run build

            - name: Prepare release bundle
              run: |
                  rm -rf obsidian-wiz-folder-sync
                  mkdir -p obsidian-wiz-folder-sync
                  cp -R .build/wiz-folder-sync-obsidian/. obsidian-wiz-folder-sync/
                  zip -r obsidian-wiz-folder-sync.zip obsidian-wiz-folder-sync

            - name: Check for optional styles
              id: styles
              run: |
                  [ -f .build/wiz-folder-sync-obsidian/styles.css ] && echo "exists=true" >> "$GITHUB_OUTPUT" || echo "exists=false" >> "$GITHUB_OUTPUT"

            - name: Attest build provenance
              uses: actions/attest@v4
              with:
                  subject-path: |
                      .build/wiz-folder-sync-obsidian/main.js
                      .build/wiz-folder-sync-obsidian/manifest.json
                      ${{ steps.styles.outputs.exists == 'true' && '.build/wiz-folder-sync-obsidian/styles.css' || '' }}
                      obsidian-wiz-folder-sync.zip

            - name: Create release
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  tag="${GITHUB_REF#refs/tags/}"

                  gh release create "$tag" \
                    --title="$tag" \
                    --draft \
                    obsidian-wiz-folder-sync.zip
